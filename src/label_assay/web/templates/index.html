{% extends "base.html" %}
{% block main %}
<h1>Check a label</h1>
<p class="lead">Upload a label image and the details filed on the application. You'll get a
result &mdash; compliant, needs review, or needs correction &mdash; with the specific rule
and citation behind each finding.</p>

<form class="card" method="post" action="/check" enctype="multipart/form-data">
  <label for="image">Label image (PNG or JPEG)</label>
  <input type="file" id="image" name="image" accept="image/png,image/jpeg" required>

  <label for="brand_name">Brand name on the application</label>
  <input type="text" id="brand_name" name="brand_name" required autocomplete="off">

  <label for="class_type">Class or type on the application</label>
  <input type="text" id="class_type" name="class_type" required autocomplete="off"
         placeholder="e.g. Kentucky Straight Bourbon Whiskey">

  <button type="submit">Check the label</button>
</form>

<p style="margin-top:1.25rem"><a href="/batch">Check many labels at once &rarr;</a></p>
{% endblock %}
