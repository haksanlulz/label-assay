{% extends "base.html" %}
{% block title %}Batch &middot; LabelAssay{% endblock %}
{% block main %}
<a class="back" href="/batch">&larr; New batch</a>
<h1>Batch Results</h1>

<p id="progress" class="lead" aria-live="polite">Starting&hellip;</p>
<noscript><p>This table renders with JavaScript. The batch runs on the server either way;
once it finishes, the Export CSV link below works without scripts.</p></noscript>
<p id="summary" class="summary" aria-live="polite"></p>

<div class="batch-controls">
  <div class="filters" role="group" aria-label="Filter results">
    <button type="button" class="chip chip--on" data-filter="all" aria-pressed="true">All</button>
    <button type="button" class="chip" data-filter="fail" aria-pressed="false">Needs correction</button>
    <button type="button" class="chip" data-filter="needs_review" aria-pressed="false">Needs review</button>
    <button type="button" class="chip" data-filter="pass" aria-pressed="false">Compliant</button>
  </div>
  <a class="csv-link" href="/batch/{{ job_id }}/export.csv">Export CSV</a>
</div>

<table class="results">
  <thead><tr><th scope="col">File</th><th scope="col">Result</th><th scope="col">Detail</th></tr></thead>
  <tbody id="rows"></tbody>
</table>

<span id="job" data-job="{{ job_id }}" hidden></span>
<script src="/static/batch.js" defer></script>
{% endblock %}
