app = "label-assay"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  # Keep one machine always running so a reviewer never hits a cold-start spinner.
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  # 2 GB: the OCR/CV runtime (opencv + onnxruntime + the RapidOCR model) plus a
  # batch's uploaded images held in memory. 1 GB was killing the process mid-batch.
  memory = "2048mb"
