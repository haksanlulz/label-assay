name: Test and deploy to Fly.io

# Runs the suite and lint on every push to main, then deploys only if they pass.
# Can be run by hand from the Actions tab. Needs a FLY_API_TOKEN repository
# secret (Fly dashboard -> Tokens -> deploy token).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Same shared libraries the Dockerfile installs: the OCR/CV wheels import
      # them at runtime, and the runner image is not guaranteed to carry them all.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libglib2.0-0 libgomp1 libgl1 libxcb1 libsm6 libxext6 libxrender1
      # --frozen honors the committed lockfile and never rewrites it. No secrets:
      # the live-API tests skip cleanly without an ANTHROPIC_API_KEY.
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run pytest

  deploy:
    name: Deploy app
    needs: test
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      # Pinned to a release tag: @master would execute whatever that third-party
      # branch holds next, in a job that carries FLY_API_TOKEN.
      - uses: superfly/flyctl-actions/setup-flyctl@1.6
      # --ha=false: batch job state lives in the process, so this app must run as
      # a single instance. Fly provisions two machines by default, which silently
      # breaks batch — a job created on one machine 404s when the poll is routed
      # to the other.
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # --ha=false only applies when machines are created; an app that already has
      # two keeps them. Enforce the invariant on every deploy so the deployment
      # cannot drift back out of step with the code.
      - run: flyctl scale count 1 --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
