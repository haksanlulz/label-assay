name: Deploy to Hugging Face Space

# The deployed artifact is the same Docker image everywhere; hosting is a cost
# decision. This syncs main to the Space, prepending the Space metadata header
# (sdk/app_port) the Hub reads from README front matter — the repository README
# stays clean on GitHub.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # the Space's git server rejects shallow pushes

      - name: Push a build snapshot to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is missing or empty - add it under Settings > Secrets and variables > Actions"
            exit 1
          fi
          SHA=$(git rev-parse --short HEAD)
          # The Space is a deploy target, not a mirror: it gets a one-commit
          # snapshot of exactly what the Docker build consumes. Test corpora
          # stay on GitHub (the Space's git rejects plain-git binaries).
          rm -rf .git tests tools .github .coverage
          cat > /tmp/space_header.md << 'EOF'
          ---
          title: LabelAssay
          emoji: 🏷️
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8000
          pinned: false
          ---
          EOF
          sed 's/^          //' /tmp/space_header.md > /tmp/header.clean
          cat /tmp/header.clean README.md > /tmp/README.md && mv /tmp/README.md README.md
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: build snapshot of ${SHA}"
          set +e
          out=$(git push --force "https://haksanlulz:${HF_TOKEN}@huggingface.co/spaces/haksanlulz/label-assay" main 2>&1)
          code=$?
          set -e
          if [ $code -ne 0 ]; then
            safe=$(printf '%s' "$out" | sed "s/${HF_TOKEN}/***/g" | tr '
' ' ')
            echo "::error::Space push failed (exit $code): ${safe}"
            exit $code
          fi
          echo "pushed snapshot of ${SHA} to the Space"
