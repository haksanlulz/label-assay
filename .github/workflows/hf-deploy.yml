name: Deploy to Hugging Face Space

# The deployed artifact is the same Docker image everywhere; hosting is a cost
# decision. This syncs main to the Space, prepending the Space metadata header
# (sdk/app_port) the Hub reads from README front matter — the repository README
# stays clean on GitHub.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepend Space metadata to README
        run: |
          cat > /tmp/space_header.md << 'EOF'
          ---
          title: LabelAssay
          emoji: 🏷️
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8000
          pinned: false
          ---
          EOF
          cat /tmp/space_header.md README.md > /tmp/README.md && mv /tmp/README.md README.md

      - name: Push to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is missing or empty — add it under Settings > Secrets and variables > Actions"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy: prepend Space metadata header"
          set +e
          out=$(git push --force "https://haksanlulz:${HF_TOKEN}@huggingface.co/spaces/haksanlulz/label-assay" HEAD:main 2>&1)
          code=$?
          set -e
          if [ $code -ne 0 ]; then
            safe=$(printf '%s' "$out" | sed "s/${HF_TOKEN}/***/g" | tr '\n' ' ')
            echo "::error::Space push failed (exit $code): ${safe}"
            exit $code
          fi
          echo "pushed to the Space"
